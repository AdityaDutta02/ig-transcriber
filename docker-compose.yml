version: '3.8'

services:
  video-transcriber:
    build: .
    container_name: video-transcriber
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # GPU-enabled version (requires nvidia-docker)
  video-transcriber-gpu:
    build: .
    container_name: video-transcriber-gpu
    ports:
      - "8502:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - gpu
