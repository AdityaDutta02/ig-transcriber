name: Keep Alive Ping

on:
  schedule:
    # Every 5 minutes, 4:00-14:55 UTC (≈ 9:30am-8:25pm IST), Mon-Sat
    - cron: "*/5 4-14 * * 1-6"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Ping app
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}" --max-time 30 || echo "000")
          echo "Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "000" ]; then
            echo "::warning::App did not respond within 30s (may be waking up)"
          elif [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::warning::App returned HTTP $HTTP_STATUS"
          else
            echo "App is up"
          fi
